name: Maestro Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Pinned prod APK — must match local flows (v7.72.0)
  METAMASK_APK_URL: https://github.com/MetaMask/metamask-mobile/releases/download/v7.72.0/metamask-blockchain-wall-android3-7.72.0-metamask-main-prod-4333.apk

jobs:
  maestro-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download MetaMask APK
        run: |
          mkdir -p apps
          curl -fL "${METAMASK_APK_URL}" -o apps/metamask.apk
          ls -lh apps/metamask.apk
          test -s apps/metamask.apk

      - name: Install Maestro CLI
        run: |
          export MAESTRO_VERSION=1.40.0
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # Base64 avoids shell-quoting issues for multi-word seed in emulator script
      - name: Prepare test credentials
        env:
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_SEED_PHRASE: ${{ secrets.TEST_SEED_PHRASE }}
        run: |
          if [ -z "${TEST_PASSWORD}" ] || [ -z "${TEST_SEED_PHRASE}" ]; then
            echo "::error::TEST_PASSWORD or TEST_SEED_PHRASE secret is empty"
            exit 1
          fi
          word_count=$(echo "${TEST_SEED_PHRASE}" | wc -w | tr -d ' ')
          echo "Seed phrase word count: ${word_count}"
          if [ "${word_count}" -ne 12 ]; then
            echo "::warning::Expected 12 seed words, got ${word_count}"
          fi
          echo "TEST_PASSWORD_B64=$(printf '%s' "${TEST_PASSWORD}" | base64 -w0)" >> "${GITHUB_ENV}"
          echo "TEST_SEED_PHRASE_B64=$(printf '%s' "${TEST_SEED_PHRASE}" | base64 -w0)" >> "${GITHUB_ENV}"

      - name: Run emulator and Maestro tests
        env:
          TEST_PASSWORD_B64: ${{ env.TEST_PASSWORD_B64 }}
          TEST_SEED_PHRASE_B64: ${{ env.TEST_SEED_PHRASE_B64 }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          ram-size: 4096M
          # One command only — runner executes each script line as a separate sh -c
          script: bash scripts/ci-maestro-android.sh

      - name: Upload Maestro report (HTML + failure screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report
          path: maestro-ci-output/
          if-no-files-found: ignore
