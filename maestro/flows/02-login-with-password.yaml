# Scenario 2: Log in with password set in scenario 01 (wallet already on device).
# Run only after 01-import-wallet.yaml completes (see scripts/run-maestro.sh).
# Credentials: same sources as scenario 1 (must match the password used in 01).
appId: io.metamask
---
- launchApp:
    clearState: false

# Unlock screen
- assertVisible:
    text: "Unlock"
    optional: true
- assertVisible:
    text: "Enter password"
    optional: true
- tapOn:
    text: "Enter password"
    optional: true
- inputText: ${TEST_PASSWORD}
- tapOn: "Unlock"

# Dismiss "Get the newest features" modal (if shown)
- tapOn:
    id: "update-needed-modal-close-button"
    optional: true

# Verify wallet home
- assertVisible: "Add funds"
